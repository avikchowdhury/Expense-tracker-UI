

<mat-toolbar color="primary" class="main-toolbar">
  <span class="app-title">AI-Powered Expense Tracker</span>
  <span class="spacer"></span>
  <ng-container *ngIf="isAuthenticated">
    <button mat-button routerLink="/dashboard" routerLinkActive="mat-accent">Dashboard</button>
    <button mat-button routerLink="/receipts" routerLinkActive="mat-accent">Receipts</button>
    <button mat-button routerLink="/budgets" routerLinkActive="mat-accent">Budgets</button>
    <button mat-button routerLink="/categories" routerLinkActive="mat-accent">Categories</button>
    <button mat-button routerLink="/profile" routerLinkActive="mat-accent">Profile</button>
    <button mat-raised-button color="accent" (click)="logout()">Logout</button>
  </ng-container>
</mat-toolbar>

<div class="content">
  <section *ngIf="!isAuthenticated" class="auth-panel">
    <h2>Login / Register</h2>
    <label>Email</label>
    <input [(ngModel)]="email" type="email" placeholder="you@example.com" />
    <label>Password</label>
    <input [(ngModel)]="password" type="password" placeholder="password" />

    <div class="button-row">
      <button (click)="login()">Login</button>
      <button (click)="register()">Register</button>
    </div>

    <p class="error" *ngIf="authError">{{ authError }}</p>
  </section>

  <router-outlet *ngIf="isAuthenticated"></router-outlet>
</div>

<style>
  .auth-panel, .dashboard { width: 100%; max-width: 760px; }
  .auth-panel h2, .dashboard h2 { margin-top: 16px; }
  .auth-panel input, .dashboard input { width: 100%; margin: 4px 0 12px; padding: 8px; font-size: 14px; }
  .button-row { display: flex; gap: 12px; margin-bottom: 8px; }
  button { padding: 8px 16px; border-radius: 4px; border: none; background: #1976d2; color: white; cursor: pointer; }
  button[disabled] { opacity: 0.6; cursor: not-allowed; }
  .error { color: #c62828; }
  .notice { color: #2e7d32; }
  .receipt-table { width: 100%; border-collapse: collapse; margin: 8px 0; }
  .receipt-table th, .receipt-table td { border: 1px solid #ddd; padding: 8px; }
  .receipt-table th { background: #f1f1f1; }
  .chart-card { margin-top: 16px; border: 1px solid #eee; padding: 12px; border-radius: 6px; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
  .bar { height: 16px; background: #1976d2; border-radius: 3px; flex-shrink: 0; min-width: 8px; }
  .analytics-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(150px,1fr)); gap: 12px; margin-bottom: 12px; }
  .card { border: 1px solid #ddd; padding: 10px; border-radius: 6px; background: #fafafa; text-align: center; }
  .empty { font-style: italic; color: #777; }
  .toolbar { position: fixed; top: 0; left: 0; right: 0; height: 56px; display: flex; align-items: center; padding: 0 16px; background: #1976d2; color: white; z-index: 3; }
  .toolbar .spacer { flex: 1; }
  .content { margin-top: 70px; padding: 12px; }
</style>
