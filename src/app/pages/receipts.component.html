<div class="receipts-header">
  <h2>Receipts</h2>
  <button mat-raised-button color="primary" (click)="fileInput.click()">Upload Receipt</button>
  <input #fileInput type="file" (change)="onFileSelected($event)" accept="image/*,application/pdf" style="display:none" />
</div>

<div class="receipts-table-container">
  <mat-form-field appearance="outline" class="receipts-search">
    <mat-label>Search</mat-label>
    <input matInput [(ngModel)]="searchTerm" (ngModelChange)="onSearch()" placeholder="Vendor, category, notes...">
    <button mat-icon-button matSuffix *ngIf="searchTerm" (click)="clearSearch()"><mat-icon>close</mat-icon></button>
  </mat-form-field>

  <table mat-table [dataSource]="receipts" class="mat-elevation-z1 receipts-table">
    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef>Date</th>
      <td mat-cell *matCellDef="let r">{{ r.uploadedAt | date:'shortDate' }}</td>
    </ng-container>
    <ng-container matColumnDef="vendor">
      <th mat-header-cell *matHeaderCellDef>Vendor</th>
      <td mat-cell *matCellDef="let r">{{ r.vendor || 'Unknown' }}</td>
    </ng-container>
    <ng-container matColumnDef="amount">
      <th mat-header-cell *matHeaderCellDef>Amount</th>
      <td mat-cell *matCellDef="let r">{{ r.totalAmount | currency }}</td>
    </ng-container>
    <ng-container matColumnDef="category">
      <th mat-header-cell *matHeaderCellDef>Category</th>
      <td mat-cell *matCellDef="let r">{{ r.category || 'Uncategorized' }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let r">
        <div class="action-buttons">
          <button mat-icon-button matTooltip="View" (click)="viewReceipt(r)"><mat-icon>visibility</mat-icon></button>
          <button mat-icon-button matTooltip="Edit" (click)="editReceipt(r)"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button matTooltip="Delete" color="warn" (click)="deleteReceipt(r)"><mat-icon>delete</mat-icon></button>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator [length]="totalReceipts" [pageSize]="pageSize" [pageIndex]="pageIndex" (page)="onPage($event)"></mat-paginator>
</div>
