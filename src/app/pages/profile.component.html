<h2>Profile & Settings</h2>

<div *ngIf="loading">Loading...</div>

<div *ngIf="!loading && profile">
	<div class="profile-header">
		<div class="avatar-section">
			<img *ngIf="profile.avatarUrl" [src]="profile.avatarUrl" alt="Avatar" class="avatar-img">
			<div *ngIf="!profile.avatarUrl" class="avatar-placeholder">No Avatar</div>
			<input type="file" accept="image/*" (change)="onAvatarSelected($event)" [disabled]="avatarUploading">
			<div *ngIf="avatarUploading">Uploading...</div>
		</div>
		<div class="profile-info">
			<div><strong>Email:</strong> {{ profile.email }}</div>
			<div><strong>Role:</strong> {{ profile.role }}</div>
		</div>
	</div>

	<form [formGroup]="editForm" (ngSubmit)="saveProfile()" class="profile-form">
		<mat-form-field appearance="fill">
			<mat-label>Email</mat-label>
			<input matInput formControlName="email">
			<mat-error *ngIf="editForm.get('email')?.hasError('required')">Email is required</mat-error>
			<mat-error *ngIf="editForm.get('email')?.hasError('email')">Invalid email</mat-error>
		</mat-form-field>
		<div class="profile-form-actions">
			<button mat-raised-button color="primary" type="submit" [disabled]="editForm.invalid">Save</button>
		</div>
	</form>

	<form [formGroup]="passwordForm" (ngSubmit)="changePassword()" class="password-form">
		<mat-form-field appearance="fill">
			<mat-label>Old Password</mat-label>
			<input matInput [type]="showOldPassword ? 'text' : 'password'" formControlName="oldPassword">
			<button mat-icon-button matSuffix type="button" (click)="showOldPassword = !showOldPassword">
				<mat-icon>{{ showOldPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
			</button>
			<mat-error *ngIf="passwordForm.get('oldPassword')?.hasError('required')">Required</mat-error>
		</mat-form-field>
		<mat-form-field appearance="fill">
			<mat-label>New Password</mat-label>
			<input matInput [type]="showNewPassword ? 'text' : 'password'" formControlName="newPassword">
			<button mat-icon-button matSuffix type="button" (click)="showNewPassword = !showNewPassword">
				<mat-icon>{{ showNewPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
			</button>
			<mat-error *ngIf="passwordForm.get('newPassword')?.hasError('required')">Required</mat-error>
			<mat-error *ngIf="passwordForm.get('newPassword')?.hasError('minlength')">Min 6 chars</mat-error>
		</mat-form-field>
		<div class="profile-form-actions">
			<button mat-raised-button color="accent" type="submit" [disabled]="passwordForm.invalid">Change Password</button>
		</div>
	</form>
</div>
