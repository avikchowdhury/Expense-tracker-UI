<div class="categories-header">
	<h2>Categories</h2>
	<button mat-raised-button color="primary" (click)="addCategory()">Add Category</button>
</div>

<div *ngIf="loading" class="loading-spinner">
	<mat-spinner diameter="40"></mat-spinner>
</div>

<div *ngIf="!loading && categories.length === 0" class="empty-state">
	<p>No categories found. Click "Add Category" to create one.</p>
</div>

<div *ngIf="!loading && categories.length > 0" class="categories-table-container">
	<table mat-table [dataSource]="categories" class="mat-elevation-z1 categories-table">
		<ng-container matColumnDef="name">
			<th mat-header-cell *matHeaderCellDef>Name</th>
			<td mat-cell *matCellDef="let c">{{ c.name }}</td>
		</ng-container>
		<ng-container matColumnDef="actions">
			<th mat-header-cell *matHeaderCellDef>Actions</th>
			<td mat-cell *matCellDef="let c">
				<button mat-icon-button matTooltip="Edit" (click)="editCategory(c)"><mat-icon>edit</mat-icon></button>
				<button mat-icon-button matTooltip="Delete" color="warn" (click)="deleteCategory(c)"><mat-icon>delete</mat-icon></button>
			</td>
		</ng-container>

		<tr mat-header-row *matHeaderRowDef="['name', 'actions']"></tr>
		<tr mat-row *matRowDef="let row; columns: ['name', 'actions'];"></tr>
	</table>
</div>
