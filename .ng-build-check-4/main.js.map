<div class="shell">
  <header class="shell-header">
    <div>
      <p class="eyebrow">AI Expense Tracker</p>
      <h1>Smart money monitoring for everyday spending</h1>
    </div>
    <button mat-raised-button color="primary" class="logout-button" (click)="logout()">
      <mat-icon>logout</mat-icon>
      Logout
    </button>
  </header>

  <nav class="shell-nav">
    <a
      *ngFor="let item of navigation"
      [routerLink]="item.path"
      routerLinkActive="active"
      class="nav-link"
    >
      <mat-icon>{{ item.icon }}</mat-icon>
      <span>{{ item.label }}</span>
    </a>
  </nav>

  <main class="shell-content">
    <router-outlet></router-outlet>
  </main>
</div>
