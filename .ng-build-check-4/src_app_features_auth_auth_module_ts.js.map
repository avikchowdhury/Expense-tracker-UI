<div class="form-copy">
  <h2>Create account</h2>
  <p>Start with secure OTP onboarding, then let AI organize and coach your expense tracking.</p>
</div>

<form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
  <mat-form-field appearance="outline">
    <mat-label>Gmail address</mat-label>
    <input matInput type="email" formControlName="email" />
    <mat-error *ngIf="form.get('email')?.hasError('required')">Email is required.</mat-error>
    <mat-error *ngIf="form.get('email')?.hasError('pattern')">Use a valid Gmail address.</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Password</mat-label>
    <input matInput [type]="showPassword ? 'text' : 'password'" formControlName="password" />
    <button mat-icon-button matSuffix type="button" (click)="showPassword = !showPassword">
      <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
    </button>
    <mat-error *ngIf="form.get('password')?.hasError('required')">Password is required.</mat-error>
    <mat-error *ngIf="form.get('password')?.hasError('minlength')">Use at least 6 characters.</mat-error>
  </mat-form-field>

  <div class="otp-row">
    <mat-form-field appearance="outline">
      <mat-label>OTP</mat-label>
      <input matInput type="text" formControlName="otp" />
      <mat-error *ngIf="form.get('otp')?.hasError('required')">OTP is required.</mat-error>
    </mat-form-field>

    <button mat-stroked-button color="primary" type="button" (click)="sendOtp()" [disabled]="sendingOtp">
      {{ sendingOtp ? 'Sending...' : 'Send OTP' }}
    </button>
  </div>

  <div class="status info" *ngIf="otpMessage">{{ otpMessage }}</div>
  <div class="status error" *ngIf="errorMessage">{{ errorMessage }}</div>

  <button mat-raised-button color="primary" type="submit" [disabled]="registering">
    {{ registering ? 'Creating account...' : 'Register and continue' }}
  </button>
</form>
