<div class="budgets-header">
	<h2>Budgets</h2>
	<button mat-raised-button color="primary" (click)="addBudget()">Add Budget</button>
</div>

<div *ngIf="loading" class="loading-spinner">
	<mat-spinner diameter="40"></mat-spinner>
</div>

<div *ngIf="!loading && budgets.length === 0" class="empty-state">
	<p>No budgets found. Click "Add Budget" to create one.</p>
</div>

<div *ngIf="!loading && budgets.length > 0" class="budgets-table-container">
	<table mat-table [dataSource]="budgets" class="mat-elevation-z1 budgets-table">
		<ng-container matColumnDef="period">
			<th mat-header-cell *matHeaderCellDef>Period</th>
			<td mat-cell *matCellDef="let b">{{ b.period }}</td>
		</ng-container>
		<ng-container matColumnDef="category">
			<th mat-header-cell *matHeaderCellDef>Category</th>
			<td mat-cell *matCellDef="let b">{{ b.category }}</td>
		</ng-container>
		<ng-container matColumnDef="amount">
			<th mat-header-cell *matHeaderCellDef>Amount</th>
			<td mat-cell *matCellDef="let b">{{ b.amount | currency }}</td>
		</ng-container>
		<ng-container matColumnDef="actions">
			<th mat-header-cell *matHeaderCellDef>Actions</th>
			<td mat-cell *matCellDef="let b">
				<button mat-icon-button matTooltip="Edit" (click)="editBudget(b)"><mat-icon>edit</mat-icon></button>
				<button mat-icon-button matTooltip="Delete" color="warn" (click)="deleteBudget(b)"><mat-icon>delete</mat-icon></button>
			</td>
		</ng-container>

		<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
		<tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
	</table>
</div>
